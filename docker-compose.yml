
services:
  postgres:
    image: postgres:15
    container_name: maxai-postgres
    ports: [ "5432:5432" ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: maxai-pgadmin
    ports: [ "5050:80" ]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

  backend:
    build: ./server-app
    container_name: maxai-backend
    env_file: ./.env
    ports: [ "3000:3000" ]
    depends_on:
      postgres:
        condition: service_healthy
    command: node dist/server.js
    environment:
      - DB_HOST=postgres

  web:
    build: ./frontend-react
    container_name: maxai-frontend-react
    env_file: ./.env
    ports: [ "5173:5173" ]
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on: [ backend ]

  ollama:
    image: ollama/ollama
    container_name: maxai-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama

  chat_api:
    build:
      context: ./chat_api
    container_name: maxai-chat-api
    env_file: ./.env
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./chat_api:/app
    environment:
      - OLLAMA_HOST=http://ollama:11434/api/chat
    depends_on:
      - ollama

volumes:
  postgres_data:
  ollama_data:
