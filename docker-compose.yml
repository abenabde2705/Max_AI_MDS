
services:
  postgres:
    image: postgres:15
    container_name: maxai-postgres
    ports: [ "5432:5432" ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server-app 
    container_name: maxai-backend
    env_file: ./server-app/.env
    ports: [ "3000:3000" ]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server-app:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - DB_HOST=postgres
      - DB_NAME=maxai
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_PORT=5432
  web:
    build: ./max
    container_name: maxai-frontend
    ports: [ "5173:5173" ]
    volumes:
      - ./max:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on: [ backend ]

  chat_api:
    build:
      context: ./chat_api
    container_name: maxai-chat-api
    ports:
      - "8000:8000"
    restart: always
    environment:
      - MISTRAL_KEY=P896w2DBvu1lvS5eeF8yn0Paz1TWMBKH
    volumes:
      - ./chat_api:/app

volumes:
  postgres_data: 