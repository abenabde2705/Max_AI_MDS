
services:
  postgres:
    image: postgres:15
    container_name: maxai-postgres
    ports: [ "5432:5432" ]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maxai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./server-app 
    container_name: maxai-backend
    env_file: ./.env
    ports: [ "3000:3000" ]
    depends_on:
      postgres:
        condition: service_healthy
    command: npm start
    environment:
      - DB_HOST=postgres
  web:
    build: ./frontend-react
    container_name: maxai-frontend-react
    env_file: ./.env
    ports: [ "5173:5173" ]
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    command: npm run dev -- --host
    depends_on: [ backend ]

  chat_api:
    build:
      context: ./chat_api
    container_name: maxai-chat-api
    env_file: ./.env
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - ./chat_api:/app

volumes:
  postgres_data: 