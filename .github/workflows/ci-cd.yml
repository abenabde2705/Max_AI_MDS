name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]  # Changé 'develop' en 'dev'
  pull_request:
    branches: [ main, dev ]

jobs:
  # Job pour le Backend
  backend-tests:
    name: Backend Tests & Quality
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
          POSTGRES_DB: max_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: server-app/package-lock.json

    - name: Install backend dependencies
      working-directory: ./server-app
      run: npm ci

    - name: Run ESLint on backend
      working-directory: ./server-app
      run: npm run lint:check

    - name: Run backend tests
      working-directory: ./server-app
      run: npm run test:coverage
      env:
        NODE_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: max_ai_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # Job pour le Frontend
  frontend-tests:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend-react/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend-react
      run: npm ci

    - name: Run ESLint on frontend
      working-directory: ./frontend-react
      run: npm run lint

    - name: Build frontend
      working-directory: ./frontend-react
      run: npm run build

  # Job pour SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install backend dependencies
      working-directory: ./server-app
      run: npm ci

    - name: Run backend tests for coverage
      working-directory: ./server-app
      run: npm run test:coverage
      env:
        NODE_ENV: test
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: SonarCloud Scan
      uses: sonarsource/sonarcloud-github-action@master
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Déploiement DEV
  deploy-dev:
    name: Deploy DEV to VPS
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Debug secrets
        run: |
          echo "User is set: ${{ secrets.DEV_VPS_USER != '' }}"
          echo "Host is set: ${{ secrets.DEV_VPS_HOST != '' }}"
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_VPS_SSH_KEY }}

      - name: Deploy on VPS (DEV)
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 ${{ secrets.DEV_VPS_USER }}@${{ secrets.DEV_VPS_HOST }} "
            set -e
            cd ${{ secrets.DEV_VPS_PATH }}
            git fetch origin
            git checkout dev
            git pull origin dev
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate
          "


  # Déploiement PROD
  deploy-prod:
    name: Deploy to PROD
    needs: [backend-tests, frontend-tests, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_VPS_SSH_KEY }}

      - name: Deploy on VPS (PROD)
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 ${{ secrets.DEV_VPS_USER }}@${{ secrets.DEV_VPS_HOST }} "
            set -e
            cd ${{ secrets.PROD_VPS_PATH }}
            git fetch origin
            git checkout main
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate
          "