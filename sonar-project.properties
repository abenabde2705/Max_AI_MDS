# Configuration SonarQube pour Max AI
sonar.projectKey=max-ai-mds
sonar.projectName=Max AI Mental Health Assistant
sonar.projectVersion=1.0

# Sources
sonar.sources=server-app/src,frontend-react/src
sonar.tests=server-app/src/tests,frontend-react/src/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.config.js,**/*.config.ts

# Couverture de code
sonar.javascript.lcov.reportPaths=server-app/coverage/lcov.info,frontend-react/coverage/lcov.info
sonar.testExecutionReportPaths=server-app/coverage/test-report.xml,frontend-react/coverage/test-report.xml

# Configuration pour JavaScript/TypeScript
sonar.typescript.node=node

# Encoding
sonar.sourceEncoding=UTF-8

# Qualité du code
sonar.qualitygate.wait=true

# Host URL (à configurer selon votre serveur SonarQube)
# sonar.host.url=https://your-sonarqube-server.com