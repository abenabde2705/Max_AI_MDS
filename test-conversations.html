<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Conversations - Max AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .section {
            margin: 30px 0;
            padding: 25px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
        }

        .section h3 {
            margin-bottom: 20px;
            color: #374151;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        input, select, textarea {
            padding: 12px 16px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6366f1;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
            width: 100%;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
        }

        .btn-primary:hover {
            background: #5b21b6;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .result {
            background: #1f2937;
            color: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-x: auto;
            border-left: 4px solid #6366f1;
        }

        .error {
            border-left-color: #ef4444;
            background: #7f1d1d;
        }

        .success {
            border-left-color: #10b981;
            background: #064e3b;
        }

        .token-display {
            background: #ede9fe;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid #c4b5fd;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #6366f1;
            display: block;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        .conversation-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: white;
        }

        .conversation-item {
            padding: 15px;
            border-bottom: 1px solid #f3f4f6;
            cursor: pointer;
            transition: background 0.2s;
        }

        .conversation-item:hover {
            background: #f8fafc;
        }

        .conversation-item.selected {
            background: #ede9fe;
            border-left: 4px solid #6366f1;
        }

        .conversation-date {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .conversation-preview {
            font-size: 14px;
            color: #374151;
        }

        .messages-container {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: white;
            padding: 15px;
        }

        .message {
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
        }

        .user-message {
            background: #ede9fe;
            margin-left: 20px;
        }

        .ai-message {
            background: #f0f9ff;
            margin-right: 20px;
        }

        .message-header {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .emoji {
            font-size: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
            
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            input, select {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test API Conversations - Max AI</h1>
        
        <!-- Authentification -->
        <div class="section">
            <h3><span class="emoji">🔐</span> Authentification</h3>
            
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" value="test@example.com">
                <input type="password" id="password" placeholder="Mot de passe" value="password123">
                <button class="btn-primary" onclick="login()">Se connecter</button>
                <button class="btn-secondary" onclick="register()">S'inscrire</button>
            </div>
            
            <div id="tokenDisplay" class="token-display" style="display: none;">
                <strong>Token JWT:</strong> <span id="tokenValue"></span>
            </div>
            
            <div id="authResult" class="result" style="display: none;"></div>
        </div>

        <!-- Statistiques -->
        <div class="section">
            <h3><span class="emoji">📊</span> Statistiques</h3>
            
            <button class="btn-primary" onclick="loadStats()">Charger les statistiques</button>
            
            <div id="statsGrid" class="stats-grid" style="display: none;">
                <div class="stat-card">
                    <span id="totalConversations" class="stat-number">-</span>
                    <div class="stat-label">Conversations totales</div>
                </div>
                <div class="stat-card">
                    <span id="totalMessages" class="stat-number">-</span>
                    <div class="stat-label">Messages totaux</div>
                </div>
                <div class="stat-card">
                    <span id="recentConversations" class="stat-number">-</span>
                    <div class="stat-label">Cette semaine</div>
                </div>
                <div class="stat-card">
                    <span id="avgMessages" class="stat-number">-</span>
                    <div class="stat-label">Moyenne par conv.</div>
                </div>
            </div>
        </div>

        <!-- Gestion des conversations -->
        <div class="section">
            <h3><span class="emoji">💬</span> Gestion des conversations</h3>
            
            <div class="form-group">
                <button class="btn-primary" onclick="createConversation()">Nouvelle conversation</button>
                <button class="btn-secondary" onclick="loadConversations()">Charger les conversations</button>
                <button class="btn-danger" onclick="deleteAllConversations()">Supprimer tout l'historique</button>
            </div>
            
            <div id="conversationsList" class="conversation-list" style="display: none;"></div>
            <div id="conversationResult" class="result" style="display: none;"></div>
        </div>

        <!-- Messages -->
        <div class="section">
            <h3><span class="emoji">📨</span> Gestion des messages</h3>
            
            <div class="form-group">
                <input type="text" id="selectedConvId" placeholder="ID de la conversation" readonly>
                <select id="messageSender">
                    <option value="user">Utilisateur</option>
                    <option value="ai">IA</option>
                </select>
            </div>
            
            <div class="form-group">
                <textarea id="messageContent" placeholder="Contenu du message..."></textarea>
            </div>
            
            <div class="form-group">
                <button class="btn-primary" onclick="sendMessage()">Envoyer message</button>
                <button class="btn-secondary" onclick="loadMessages()">Charger messages</button>
            </div>
            
            <div id="messagesContainer" class="messages-container" style="display: none;"></div>
            <div id="messageResult" class="result" style="display: none;"></div>
        </div>

        <!-- Test de suppression -->
        <div class="section">
            <h3><span class="emoji">🗑️</span> Tests de suppression</h3>
            
            <div class="form-group">
                <input type="text" id="deleteConvId" placeholder="ID conversation à supprimer">
                <button class="btn-danger" onclick="deleteConversation()">Supprimer conversation</button>
            </div>
            
            <div id="deleteResult" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentToken = localStorage.getItem('authToken') || '';
        let selectedConversationId = '';

        // Utilitaires
        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = `result ${isError ? 'error' : 'success'}`;
            element.textContent = JSON.stringify(data, null, 2);
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentToken}`
            };
        }

        // Authentification
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        firstName: 'Test',
                        lastName: 'User',
                        email,
                        password,
                        age: 25
                    })
                });
                
                const data = await response.json();
                showResult('authResult', data, !response.ok);
                
                if (data.token) {
                    currentToken = data.token;
                    localStorage.setItem('authToken', currentToken);
                    document.getElementById('tokenValue').textContent = currentToken.substring(0, 50) + '...';
                    document.getElementById('tokenDisplay').style.display = 'block';
                }
            } catch (error) {
                showResult('authResult', { error: error.message }, true);
            }
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                showResult('authResult', data, !response.ok);
                
                if (data.token) {
                    currentToken = data.token;
                    localStorage.setItem('authToken', currentToken);
                    document.getElementById('tokenValue').textContent = currentToken.substring(0, 50) + '...';
                    document.getElementById('tokenDisplay').style.display = 'block';
                }
            } catch (error) {
                showResult('authResult', { error: error.message }, true);
            }
        }

        // Statistiques
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/conversations/stats/summary`, {
                    headers: getHeaders()
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('totalConversations').textContent = data.totalConversations;
                    document.getElementById('totalMessages').textContent = data.totalMessages;
                    document.getElementById('recentConversations').textContent = data.recentConversations;
                    document.getElementById('avgMessages').textContent = data.averageMessagesPerConversation;
                    document.getElementById('statsGrid').style.display = 'grid';
                } else {
                    showResult('conversationResult', data, true);
                }
            } catch (error) {
                showResult('conversationResult', { error: error.message }, true);
            }
        }

        // Conversations
        async function createConversation() {
            try {
                const response = await fetch(`${API_BASE}/conversations`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                
                const data = await response.json();
                showResult('conversationResult', data, !response.ok);
                
                if (response.ok) {
                    loadConversations();
                }
            } catch (error) {
                showResult('conversationResult', { error: error.message }, true);
            }
        }

        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE}/conversations`, {
                    headers: getHeaders()
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayConversations(data);
                } else {
                    showResult('conversationResult', data, true);
                }
            } catch (error) {
                showResult('conversationResult', { error: error.message }, true);
            }
        }

        function displayConversations(conversations) {
            const container = document.getElementById('conversationsList');
            container.innerHTML = '';
            
            if (conversations.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #64748b;">Aucune conversation</div>';
            } else {
                conversations.forEach(conv => {
                    const item = document.createElement('div');
                    item.className = 'conversation-item';
                    item.onclick = () => selectConversation(conv.id);
                    
                    const date = new Date(conv.started_at).toLocaleString('fr-FR');
                    const preview = conv.lastMessage ? 
                        `${conv.lastMessage.sender === 'user' ? 'Vous' : 'IA'}: ${conv.lastMessage.content.substring(0, 100)}...` : 
                        'Aucun message';
                    
                    item.innerHTML = `
                        <div class="conversation-date">${date}</div>
                        <div class="conversation-preview">${preview}</div>
                        <div style="font-size: 12px; color: #9ca3af; margin-top: 5px;">ID: ${conv.id}</div>
                    `;
                    
                    container.appendChild(item);
                });
            }
            
            container.style.display = 'block';
        }

        function selectConversation(id) {
            selectedConversationId = id;
            document.getElementById('selectedConvId').value = id;
            document.getElementById('deleteConvId').value = id;
            
            // Mettre à jour la sélection visuelle
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            loadMessages();
        }

        async function deleteConversation() {
            const id = document.getElementById('deleteConvId').value;
            if (!id) return;
            
            try {
                const response = await fetch(`${API_BASE}/conversations/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                const data = await response.json();
                showResult('deleteResult', data, !response.ok);
                
                if (response.ok) {
                    loadConversations();
                    loadStats();
                }
            } catch (error) {
                showResult('deleteResult', { error: error.message }, true);
            }
        }

        async function deleteAllConversations() {
            if (!confirm('Supprimer toutes les conversations ?')) return;
            
            try {
                const response = await fetch(`${API_BASE}/conversations`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                const data = await response.json();
                showResult('deleteResult', data, !response.ok);
                
                if (response.ok) {
                    loadConversations();
                    loadStats();
                }
            } catch (error) {
                showResult('deleteResult', { error: error.message }, true);
            }
        }

        // Messages
        async function sendMessage() {
            const conversationId = document.getElementById('selectedConvId').value;
            const sender = document.getElementById('messageSender').value;
            const content = document.getElementById('messageContent').value;
            
            if (!conversationId || !content) {
                alert('Sélectionnez une conversation et saisissez un message');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        conversation_id: conversationId,
                        sender,
                        content
                    })
                });
                
                const data = await response.json();
                showResult('messageResult', data, !response.ok);
                
                if (response.ok) {
                    document.getElementById('messageContent').value = '';
                    loadMessages();
                }
            } catch (error) {
                showResult('messageResult', { error: error.message }, true);
            }
        }

        async function loadMessages() {
            const conversationId = document.getElementById('selectedConvId').value;
            if (!conversationId) return;
            
            try {
                const response = await fetch(`${API_BASE}/messages/${conversationId}`, {
                    headers: getHeaders()
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    displayMessages(data);
                } else {
                    showResult('messageResult', data, true);
                }
            } catch (error) {
                showResult('messageResult', { error: error.message }, true);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #64748b; padding: 20px;">Aucun message</div>';
            } else {
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.sender === 'user' ? 'user-message' : 'ai-message'}`;
                    
                    const date = new Date(msg.sent_at).toLocaleString('fr-FR');
                    const sender = msg.sender === 'user' ? 'Vous' : 'IA';
                    
                    messageDiv.innerHTML = `
                        <div class="message-header">${sender} - ${date}</div>
                        <div>${msg.content}</div>
                        ${msg.emotion_detected ? `<div style="font-style: italic; margin-top: 5px; color: #6366f1;">Émotion: ${msg.emotion_detected}</div>` : ''}
                    `;
                    
                    container.appendChild(messageDiv);
                });
            }
            
            container.style.display = 'block';
        }

        // Charger le token au démarrage
        if (currentToken) {
            document.getElementById('tokenValue').textContent = currentToken.substring(0, 50) + '...';
            document.getElementById('tokenDisplay').style.display = 'block';
        }
    </script>
</body>
</html>
